<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 300px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      background: #fff;
    }
    h2 { font-size: 15px; font-weight: 700; margin-bottom: 16px; }
    label { display: block; font-size: 11px; font-weight: 600; color: #666; margin-bottom: 4px; margin-top: 12px; }
    label:first-of-type { margin-top: 0; }
    input {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: #2563eb; }
    button {
      width: 100%;
      margin-top: 16px;
      padding: 9px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #1d4ed8; }
    #status {
      margin-top: 10px;
      font-size: 12px;
      text-align: center;
      min-height: 16px;
    }
    .success { color: #16a34a; }
    .error   { color: #dc2626; }
    .divider { border: none; border-top: 1px solid #f0f0f0; margin: 16px 0 0; }
    .hint { font-size: 11px; color: #999; margin-top: 10px; line-height: 1.5; }
  </style>
</head>
<body>
  <h2>휴넷 회의실 동기화</h2>

  <label for="apiUrl">시스템 URL</label>
  <input id="apiUrl" type="url" placeholder="https://hunet-interview-scheduler.vercel.app" />

  <label for="apiKey">API 키</label>
  <input id="apiKey" type="password" placeholder="관리자에게 발급받은 키 입력" />

  <button id="save">저장</button>
  <div id="status"></div>

  <hr class="divider" />
  <p class="hint">
    다우오피스에서 회의실을 예약·수정·취소하면<br />
    면접 일정 시스템에 자동으로 반영됩니다.
  </p>

  <script src="popup.js"></script>
</body>
</html>
